    <div class="container">
        
    <div class="card">
        <h2>Book Appointment</h2>
        
        <form id="appointmentForm" action="bookappointment" method="post">
            
            <div class="form-group">
                <label>Patient Name</label>
                <input type="text" name="aname" required>
            </div>
            
            <div class="form-group">
                <label>Doctor</label>
                <select name="adoctor">
                    <option>Dr. Sharma (Cardiologist)</option>
                    <option>Dr. Patel (Dermatologist)</option>
                    <option>Dr. Verma (General Physician)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="adate" required>
            </div>
            
            <div class="form-group">
                <label>Town / District</label>
                <input type="text" name="town_district" required>
            </div>
            
            <div class="form-group">
                <label>Area / Locality</label>
                <input type="text" name="area_locality" required>
            </div>
            
            <div class="form-group">
                <label>State</label>
                <input type="text" name="state" required>
            </div>
            
            <button type="submit" class="btn">
                Book Appointment
            </button>
            
        </form>
    </div>
